<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shefcoin Super-App</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #517da2; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .phone-container { width: 360px; height: 640px; background: white; border-radius: 30px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 8px solid #333; }
        .status-bar { background: #4a6ea9; color: white; padding: 5px 20px; font-size: 12px; display: flex; justify-content: space-between; }
        .app-header { background: #517da2; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
        .chat-window { flex: 1; background: #e7ebf0; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .bot-msg { background: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-msg { background: #effdde; align-self: flex-end; border-bottom-right-radius: 2px; }
        .input-bar { padding: 10px; background: white; display: flex; align-items: center; border-top: 1px solid #ddd; }
        input { flex: 1; border: none; padding: 10px; outline: none; font-size: 14px; }
        button { background: none; border: none; color: #517da2; font-weight: bold; cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="status-bar"><span>19:40</span> <span>📶 🔋</span></div>
        <div class="app-header">Shefcoin AI-Bot</div>
        <div class="chat-window" id="chat">
            <div class="msg bot-msg">Салом! Ин версияи вебии боти ту аст. Чӣ хел кӯмак кунам?</div>
        </div>
        <div class="input-bar">
            <input type="text" id="userInput" placeholder="Нависед...">
            <button onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            if (input.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = 'msg user-msg';
                div.innerText = input.value;
                chat.appendChild(div);
                input.value = "";
                chat.scrollTop = chat.scrollHeight;
                
                // Ин ҷо дар оянда метавон пайваст бо AI-ро илова кард
                setTimeout(() => {
                    const botDiv = document.createElement('div');
                    botDiv.className = 'msg bot-msg';
                    botDiv.innerText = "Ман паёми шуморо гирифтам! (Ин намуна аст)";
                    chat.appendChild(botDiv);
                    chat.scrollTop = chat.scrollHeight;
                }, 1000);
            }
        }
    </script>
</body>
</html>
